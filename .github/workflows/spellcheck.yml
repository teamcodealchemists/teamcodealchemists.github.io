name: Controllo Ortografico Documentazione

on: [push]
  
  #:
  #  paths:
  #    - 'documents/**/*.pdf'

jobs:
  grammar_check:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del codice
      - name: Checkout del codice
        uses: actions/checkout@v2

      # 2. Installa i pacchetti necessari (poppler-utils per pdftotext)
      - name: Installa pdftotext
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # 3. Estrai testo dai PDF
      - name: Estrai testo dai PDF
        run: |
          mkdir -p ./documents/txt
          find ./documents -name "*.pdf" | while IFS= read -r file; do
            filename=$(basename "$file" .pdf)
            dir=$(dirname "$file")
            mkdir -p "$dir/txt"
            pdftotext "$file" "$dir/txt/$filename.txt"
          done

      # 4. Scarica LanguageTool
      - name: Scarica LanguageTool
        run: |
          wget https://languagetool.org/download/LanguageTool-stable.zip
          unzip LanguageTool-stable.zip

      # 5. Esegui LanguageTool sui file .txt
      - name: Esegui LanguageTool
        run: |
          for file in ./documents/txt/*.txt; do
            java -jar LanguageTool-*/languagetool-commandline.jar \
              --language it-IT "$file"
          done

